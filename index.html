<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ξενοδοχείο Κλειστό</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}
.bg {
  background-image: url('hotel.jpg'); /* Το όνομα της εικόνας φόντου */
  height: 100vh;
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
}
.box {
  background: rgba(0,0,0,0.5); /* Ημιδιαφανές μαύρο πλαίσιο για να φαίνεται το κείμενο */
  padding: 40px;
  border-radius: 10px;
}
h1 { font-size: 40px; }
p { font-size: 20px; }
</style>
</head>
<body>
<div class="bg">
  <div class="box">
    <h1>Το ξενοδοχείο θα παραμείνει κλειστό</h1>
    <p>Σας ευχαριστούμε για την κατανόηση</p>
  </div>
</div>
</body>
</html>
