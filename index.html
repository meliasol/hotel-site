<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>See You in 2027!</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}
.bg {
  background-image: url('hotel.jpg'); /* φόντο σου */
  height: 100vh;
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.box {
  background: rgba(0,0,0,0.6);
  padding: 30px 20px;
  border-radius: 15px;
  max-width: 500px;
}
h1 { 
  font-size: 36px; 
  margin-bottom: 20px; 
  line-height: 1.2; 
}
p { 
  font-size: 20px; 
  line-height: 1.5; 
}
@media (max-width: 400px) {
  h1 { font-size: 28px; }
  p { font-size: 18px; }
  .box { padding: 20px 15px; }
}
</style>
</head>
<body>
<div class="bg">
  <div class="box">
    <h1>See You in 2027!</h1>
    <p>Our hotel is taking a short break this season to refresh and improve.<br>
       We look forward to welcoming you back next year for an amazing stay!</p>
  </div>
</div>
</body>
</html>
